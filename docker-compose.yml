version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: linksaver
      POSTGRES_PASSWORD: linksaver
      POSTGRES_DB: linksaver
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linksaver"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://linksaver:linksaver@postgres:5432/linksaver
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./frontend:/frontend

  bot:
    build: ./bot
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_API_BASE_URL: https://openrouter.ai/api/v1
      LLM_MODEL: google/gemma-3-4b-it:free
      API_BASE_URL: http://backend:8000
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - backend

volumes:
  pgdata:
